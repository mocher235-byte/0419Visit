<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCSEA 2026 縣市交流參訪</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
        }
        @keyframes bounce-subtle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-bounce-slow {
            animation: bounce-subtle 3s ease-in-out infinite;
        }
        /* 優化捲軸 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .glass-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const vips = [
                { city: '屏東縣', name: '林瓊琳', photo: 'https://i.postimg.cc/mZvqCTx2/IMG-7980.jpg', logo: 'https://i.postimg.cc/sfk873Fp/S-651706383-0.jpg' },
                { city: '高雄市', name: '王怡瑾', photo: 'https://i.postimg.cc/zDsMKqmB/IMG-7981.jpg', logo: 'https://i.postimg.cc/FFMq3htc/S-651706379-0.jpg' },
                { city: '臺南市', name: '洪嘉鴻', photo: 'https://i.postimg.cc/kM0ZK7r2/IMG-7985.jpg', logo: 'https://i.postimg.cc/WpBKgsRG/S-651706388-0.jpg' },
                { city: '嘉義縣', name: '林秋娟', photo: 'https://i.postimg.cc/y6M5c7qN/IMG-7979.jpg', logo: 'https://i.postimg.cc/ZYGgpJkv/S-651706374-0.jpg', title: '輔導理事長' },
                { city: '雲林縣', name: '謝瑞娥', photo: 'https://i.postimg.cc/SQB5Cm0R/IMG-7982.jpg', logo: 'https://i.postimg.cc/SQB5Cm0z/S-651706378-0.jpg' },
                { city: '彰化縣', name: '黃瑞呈', photo: 'https://i.postimg.cc/05T3D9gb/IMG-7984.jpg', logo: 'https://i.postimg.cc/BZryHJWL/S-651706373-0.jpg' },
                { city: '南投縣', name: '陳韻偉', photo: 'https://i.postimg.cc/jqp9PRVC/IMG-7983.jpg', logo: 'https://i.postimg.cc/dQbXrJMr/S-651706384-0.jpg' },
                { city: '新竹縣', name: '蔡士松', photo: 'https://i.postimg.cc/QN2P1jLB/IMG-8622.jpg', logo: 'https://i.postimg.cc/vZcVywTy/web.png', isHost: true }
            ];

            const attendeeGroups = [
                { city: '雲林縣', members: ['理事長：謝瑞娥', '常務理事：李素蓮', '理事：劉邦欽', '監事：李淑婉'] },
                { city: '高雄市', members: ['理事長：王怡瑾', '常務理事：陳逸虹'] },
                { city: '屏東縣', members: ['理事長：林瓊琳', '常務理事：陳豐裕'] },
                { city: '嘉義縣', members: ['輔導理事長：林秋娟'] },
                { city: '彰化縣', members: ['理事長：黃瑞呈', '常務理事：林世傑', '常務監事：葉子琳', '秘書：王瑞瑗'] },
                { city: '南投縣', members: ['理事長：陳韻偉', '常務理事：賴小莉', '常務理事：邊瑞憲', '理事長特助：毛炳楠'] },
                { city: '臺南市', members: ['理事長：洪嘉鴻', '總幹事：吳旋毓', '秘書：楊曜穗', '常務理事：方建宥', '理事：吳政瑞、呂嘉元'] }
            ];

            const forumTopics = [
                { host: '榮昌', focus: '工會領域', q1: '如何壯大營運、提升工會會員福利？（雲林）', q2: '補教和工會合作模式及經費分攤機制？（嘉義）', color: 'border-blue-500' },
                { host: '士松', focus: '協會領域', q1: '如何施壓處理未立案及違反法規業者？（雲林）', q2: '提升偏遠研習率及回應選舉邀約？（嘉義）', color: 'border-red-500' },
                { host: '建國', focus: 'AI科技', q1: '學習修圖、製作內容等基本專業？（雲林）', q2: 'AI 如何輔助課程與有效行銷方式？（嘉義）', color: 'border-green-500' },
                { host: '惠華', focus: '國小經營', q1: '提升家長與補習班認同與共識凝聚？（雲林）', q2: '缺工下如何滿足家長需求？（嘉義）', color: 'border-yellow-500' },
                { host: '金隆', focus: '升學策略', q2: '高中英文升學優勢及制度採計？（嘉義）', color: 'border-purple-500' },
                { host: '志清', focus: '廠商推廣', q1: '廠商駐點服務爭取硬體福利？（雲林）', q2: '同區域推廣相同課程之處理機制？（嘉義）', color: 'border-slate-500' }
            ];

            return (
                <div className="min-h-screen bg-slate-50 pb-10 selection:bg-blue-100 selection:text-blue-900">
                    
                    {/* --- 導航列 --- */}
                    <nav className={`fixed top-0 left-0 w-full z-50 transition-all duration-300 ${scrolled ? 'glass-nav shadow-md py-3' : 'bg-transparent py-6'}`}>
                        <div className="max-w-6xl mx-auto px-6 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <img src="https://i.postimg.cc/vZcVywTy/web.png" alt="Logo" className="w-10 h-10 object-contain" />
                                <span className={`font-black tracking-tighter text-xl ${scrolled ? 'text-slate-800' : 'text-white'}`}>HCSEA 2026</span>
                            </div>
                            <button onClick={() => window.scrollTo({top: 0, behavior: 'smooth'})} className={`text-xs font-bold uppercase tracking-widest px-4 py-2 rounded-full border ${scrolled ? 'text-slate-500 border-slate-200' : 'text-white/70 border-white/20'}`}>Top</button>
                        </div>
                    </nav>

                    {/* --- 懸浮功能鍵 --- */}
                    <div className="fixed bottom-8 right-6 z-[60] flex flex-col gap-4 items-end">
                        <a href="https://www.facebook.com/hcsea1/" target="_blank" rel="noopener noreferrer" className="flex items-center gap-3 bg-[#1877F2] text-white px-5 py-3 rounded-2xl shadow-xl hover:scale-105 active:scale-95 transition-all">
                            <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                            <span className="font-bold text-sm">協會粉專</span>
                        </a>
                        <a href="https://line.me/ti/p/vQcf6cONnl" target="_blank" rel="noopener noreferrer" className="flex items-center gap-3 bg-[#06C755] text-white px-5 py-3 rounded-2xl shadow-xl hover:scale-105 active:scale-95 transition-all">
                            <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M24 10.304c0-4.587-4.783-8.304-10.667-8.304-5.884 0-10.667 3.717-10.667 8.304 0 4.108 3.792 7.546 8.904 8.213l-1.612 3.884c-.05.121-.025.258.059.346.062.062.146.096.233.096a.39.39 0 00.154-.033l4.571-3.15c.446.038.904.058 1.362.058 5.884 0 10.667-3.717 10.667-8.313z"/></svg>
                            <span className="font-bold text-sm">聯絡建國</span>
                        </a>
                    </div>

                    {/* --- 行程表燈箱 --- */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/95 backdrop-blur-sm flex items-center justify-center p-4" onClick={() => setIsModalOpen(false)}>
                            <div className="relative max-w-4xl w-full bg-white rounded-3xl overflow-hidden shadow-2xl" onClick={e => e.stopPropagation()}>
                                <img src="https://i.postimg.cc/yd6Yy0wP/S-195338276.jpg" alt="行程表" className="w-full h-auto" />
                                <button onClick={() => setIsModalOpen(false)} className="absolute top-4 right-4 bg-black/50 text-white p-2 rounded-full hover:bg-black/70">
                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
                                </button>
                            </div>
                        </div>
                    )}

                    {/* --- Hero 區 (已針對手機換行優化) --- */}
                    <header className="relative bg-[#0f172a] text-white pt-40 pb-24 px-6 text-center">
                        <div className="absolute inset-0 bg-gradient-to-br from-blue-600/30 to-transparent"></div>
                        <div className="relative z-10 max-w-4xl mx-auto">
                            <div className="inline-block animate-bounce-slow mb-8">
                                <img src="https://i.postimg.cc/vZcVywTy/web.png" alt="Logo" className="w-24 h-24 p-3 bg-white rounded-3xl shadow-2xl mx-auto" />
                            </div>
                            <h1 className="text-4xl md:text-7xl font-black mb-6 tracking-tight leading-tight md:leading-snug">
                                <span className="block md:inline">熱烈歡迎</span>
                                <span className="block md:inline text-blue-400">縣市交流</span>
                            </h1>
                            <p className="text-lg md:text-3xl font-bold text-slate-300 max-w-2xl mx-auto leading-relaxed">中南部七縣市補教菁英參訪新竹縣補教協會</p>
                            <div className="flex justify-center gap-4 mt-10">
                                <div className="h-1.5 w-16 bg-blue-500 rounded-full"></div>
                                <div className="h-1.5 w-6 bg-yellow-400 rounded-full"></div>
                                <div className="h-1.5 w-16 bg-blue-500 rounded-full"></div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto px-4 -mt-12 relative z-20">
                        
                        {/* --- 核心代表 --- */}
                        <section className="bg-white rounded-[3rem] shadow-xl p-8 md:p-16 mb-12 border border-slate-100">
                            <div className="flex items-center gap-4 mb-16">
                                <div className="w-2.5 h-12 bg-blue-600 rounded-full"></div>
                                <h2 className="text-3xl md:text-4xl font-black text-slate-800 tracking-tight">參訪團核心代表</h2>
                            </div>
                            <div className="grid grid-cols-2 lg:grid-cols-4 gap-x-8 gap-y-16">
                                {vips.map((vip, i) => (
                                    <div key={i} className="flex flex-col items-center group">
                                        <div className="relative mb-6">
                                            <div className={`w-36 h-36 md:w-48 md:h-48 rounded-full overflow-hidden border-4 bg-white p-1 transition-all duration-500 group-hover:scale-105 ${vip.isHost ? 'border-blue-600 ring-8 ring-blue-50' : 'border-yellow-400 ring-8 ring-yellow-50'} shadow-xl`}>
                                                <img src={vip.photo} alt={vip.name} className="w-full h-full object-cover rounded-full" />
                                            </div>
                                            <div className="absolute -bottom-2 -right-2 w-14 h-14 bg-white rounded-full border-2 border-slate-100 p-2 shadow-lg group-hover:rotate-12 transition-transform">
                                                <img src={vip.logo} alt="Logo" className="w-full h-full object-contain" />
                                            </div>
                                        </div>
                                        <div className="text-center">
                                            <div className={`text-xs font-black uppercase tracking-widest mb-2 ${vip.isHost ? 'text-blue-600' : 'text-blue-800'}`}>
                                                {vip.city}{vip.isHost && ' (主辦)'}
                                            </div>
                                            <div className="text-3xl font-black text-slate-800 mb-1">{vip.name}</div>
                                            <div className="text-slate-400 text-xs font-bold uppercase tracking-[0.3em]">{vip.title || '理事長'}</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* --- 出席名錄 --- */}
                        <section className="bg-white rounded-[3rem] shadow-xl p-8 md:p-16 mb-12 border border-slate-100">
                            <div className="flex items-center gap-4 mb-12">
                                <div className="w-2.5 h-12 bg-emerald-500 rounded-full"></div>
                                <h2 className="text-3xl md:text-4xl font-black text-slate-800 tracking-tight">各縣市出席人員名錄</h2>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                {attendeeGroups.map((group, i) => (
                                    <div key={i} className="bg-slate-50/50 p-8 rounded-[2.5rem] border border-slate-100 hover:bg-white hover:shadow-2xl transition-all duration-500">
                                        <div className="flex items-center justify-between mb-6 border-b border-slate-200 pb-4">
                                            <span className="text-2xl font-black text-blue-700">{group.city}</span>
                                            <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest bg-slate-200/50 px-2 py-1 rounded">VIP Guest</span>
                                        </div>
                                        <div className="space-y-3">
                                            {group.members.map((member, j) => {
                                                const [title, name] = member.split('：');
                                                return (
                                                    <div key={j} className="flex justify-between items-center group/member">
                                                        <span className="text-slate-400 text-sm font-bold group-hover/member:text-blue-500 transition-colors">{title}</span>
                                                        <span className="text-slate-800 font-black text-base">{name}</span>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* --- 交通與地圖 --- */}
                        <section className="bg-white rounded-[3rem] shadow-xl p-8 md:p-16 mb-12 border border-slate-100 overflow-hidden">
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
                                <div className="space-y-10">
                                    <div className="flex items-center gap-4">
                                        <div className="w-2.5 h-12 bg-red-500 rounded-full"></div>
                                        <h2 className="text-3xl md:text-4xl font-black text-slate-800 tracking-tight">協會資訊與交通</h2>
                                    </div>
                                    
                                    <div className="space-y-6">
                                        <div className="flex items-start gap-6 p-6 rounded-[2rem] bg-blue-50/30 border border-blue-100/50">
                                            <div className="bg-white p-4 rounded-2xl shadow-sm text-blue-600">
                                                <svg className="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                                            </div>
                                            <div>
                                                <h4 className="text-slate-400 font-bold text-xs uppercase tracking-widest mb-1">Office Address</h4>
                                                <p className="text-xl font-black text-slate-800">新竹縣竹北市文孝街23號</p>
                                            </div>
                                        </div>

                                        <div className="flex items-start gap-6 p-6 rounded-[2rem] bg-green-50/30 border border-green-100/50">
                                            <div className="bg-white p-4 rounded-2xl shadow-sm text-green-600">
                                                <svg className="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1.01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
                                            </div>
                                            <div>
                                                <h4 className="text-slate-400 font-bold text-xs uppercase tracking-widest mb-1">Hotline</h4>
                                                <p className="text-xl font-black text-slate-800">03 657 9876</p>
                                            </div>
                                        </div>
                                    </div>

                                    <a href="https://share.google/9xB8KdfwvkEZpznN3" target="_blank" rel="noopener noreferrer" className="flex items-center justify-center gap-4 bg-blue-600 text-white py-6 rounded-[2rem] font-black text-xl shadow-2xl hover:bg-blue-700 hover:shadow-blue-200 transition-all active:scale-95 group">
                                        開啟會館 Google 導航
                                        <svg className="w-6 h-6 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
                                    </a>
                                </div>

                                <div className="bg-slate-900 rounded-[3rem] p-10 text-white shadow-2xl relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-32 h-32 bg-yellow-400/10 rounded-full -mr-16 -mt-16 blur-2xl"></div>
                                    <h3 className="text-2xl font-black mb-10 flex items-center gap-4">
                                        <span className="bg-yellow-400 text-slate-900 w-10 h-10 flex items-center justify-center rounded-xl text-lg">P</span> 停車指南 (點擊名稱導航)
                                    </h3>
                                    <div className="space-y-8">
                                        <div className="group">
                                            <p className="font-bold text-slate-500 text-xs mb-2 uppercase tracking-[0.2em]">Option 01</p>
                                            <a href="https://maps.app.goo.gl/agv5y4ht4oeDtABX7" target="_blank" rel="noopener noreferrer" className="text-2xl font-black mb-2 hover:text-yellow-400 transition-colors block">
                                                富山停車場
                                                <svg className="w-5 h-5 inline-block ml-2 opacity-50 group-hover:opacity-100 transition-opacity" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 0 1 0-5 2.5 2.5 0 0 1 0 5z"/></svg>
                                            </a>
                                            <p className="text-blue-400 font-bold">竹北市文孝街66號 (半小時 15 元)</p>
                                        </div>
                                        <div className="h-px bg-white/10 w-full"></div>
                                        <div className="group">
                                            <p className="font-bold text-slate-500 text-xs mb-2 uppercase tracking-[0.2em]">Option 02</p>
                                            <a href="https://maps.app.goo.gl/5mkiY5a3Hn1kANrC8" target="_blank" rel="noopener noreferrer" className="text-2xl font-black mb-2 hover:text-yellow-400 transition-colors block leading-tight">
                                                婦幼館旁文忠公園停車場
                                                <svg className="w-5 h-5 inline-block ml-2 opacity-50 group-hover:opacity-100 transition-opacity" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 0 1 0-5 2.5 2.5 0 0 1 0 5z"/></svg>
                                            </a>
                                            <p className="text-blue-400 font-bold">竹北市文忠路163號 (一小時 20 元)</p>
                                        </div>
                                        <div className="pt-6">
                                           <a href="https://youtu.be/kEMK6XniOn4" target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-3 bg-red-600 text-white px-6 py-3 rounded-2xl font-black hover:bg-red-700 transition-all shadow-lg">
                                             <span className="flex h-3 w-3 relative">
                                                <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-white opacity-75"></span>
                                                <span className="relative inline-flex rounded-full h-3 w-3 bg-white"></span>
                                             </span>
                                             補教會館停車擺放說明
                                           </a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* --- 行程表 --- */}
                        <section className="bg-white rounded-[3rem] shadow-xl p-8 md:p-16 mb-12 border border-slate-100">
                            <div className="flex items-center gap-4 mb-10">
                                <div className="w-2.5 h-12 bg-indigo-500 rounded-full"></div>
                                <h2 className="text-3xl md:text-4xl font-black text-slate-800 tracking-tight">參訪行程規劃</h2>
                            </div>
                            <div className="relative group cursor-zoom-in rounded-[2.5rem] overflow-hidden shadow-2xl" onClick={() => setIsModalOpen(true)}>
                                <img src="https://i.postimg.cc/yd6Yy0wP/S-195338276.jpg" alt="行程預覽" className="w-full h-auto transition-transform duration-700 group-hover:scale-105" />
                                <div className="absolute inset-0 bg-blue-900/40 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-all duration-500 backdrop-blur-[2px]">
                                    <span className="bg-white text-slate-900 px-10 py-4 rounded-full font-black text-xl shadow-2xl scale-90 group-hover:scale-100 transition-transform">點擊放大查看完整行程</span>
                                </div>
                            </div>
                        </section>

                        {/* --- 座談議題 --- */}
                        <section className="mb-24">
                            <div className="flex items-center gap-4 mb-12">
                                <div className="w-2.5 h-12 bg-orange-500 rounded-full"></div>
                                <h2 className="text-3xl md:text-4xl font-black text-slate-800 tracking-tight">綜合座談：焦點對話</h2>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                {forumTopics.map((topic, i) => (
                                    <div key={i} className={`p-10 rounded-[3rem] bg-white border-l-[12px] shadow-lg hover:shadow-2xl transition-all duration-500 hover:-translate-y-2 ${topic.color}`}>
                                        <h4 className="text-2xl font-black text-slate-800 mb-8 flex items-center gap-3">
                                           <span className="text-orange-500">●</span> {topic.host} <span className="text-slate-300 font-light mx-1">/</span> <span className="text-blue-600">{topic.focus}</span>
                                        </h4>
                                        <div className="space-y-6">
                                            {topic.q1 && (
                                                <div className="p-6 bg-slate-50 rounded-3xl border border-slate-100 relative group">
                                                    <div className="absolute top-4 right-4 text-blue-100 font-black text-4xl select-none group-hover:text-blue-200 transition-colors">Q</div>
                                                    <div className="text-blue-600 text-xs font-black uppercase mb-2 tracking-widest bg-blue-50 w-fit px-3 py-1 rounded-full">雲林提問</div>
                                                    <div className="text-slate-700 font-bold text-lg leading-relaxed relative z-10">{topic.q1}</div>
                                                </div>
                                            )}
                                            {topic.q2 && (
                                                <div className="p-6 bg-slate-50 rounded-3xl border border-slate-100 relative group">
                                                    <div className="absolute top-4 right-4 text-emerald-100 font-black text-4xl select-none group-hover:text-emerald-200 transition-colors">Q</div>
                                                    <div className="text-emerald-600 text-xs font-black uppercase mb-2 tracking-widest bg-emerald-50 w-fit px-3 py-1 rounded-full">嘉義提問</div>
                                                    <div className="text-slate-700 font-bold text-lg leading-relaxed relative z-10">{topic.q2}</div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>

                    </main>

                    {/* --- Footer --- */}
                    <footer className="bg-[#0f172a] text-white py-24 px-6 text-center relative overflow-hidden">
                        <div className="absolute bottom-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 via-yellow-400 to-emerald-500"></div>
                        <div className="max-w-4xl mx-auto relative z-10">
                            <img src="https://i.postimg.cc/vZcVywTy/web.png" alt="Logo" className="w-16 h-16 mx-auto mb-10 opacity-30 grayscale invert" />
                            <p className="text-sm font-black tracking-[0.4em] text-slate-500 uppercase mb-6">Education Synergy 2026</p>
                            <div className="text-slate-500 font-medium text-sm leading-loose">
                                新竹縣補教協會 主辦 <span className="mx-3 opacity-20">|</span> 中南部七縣市補教協會 共同參訪<br />
                                <span className="text-slate-600 font-bold mt-4 block tracking-wider">© 2026 Hsinchu County Private Education Association.</span>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
